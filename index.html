<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Счётчик сигарет</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f0eb">
  <style>
    /* Все стили без изменений (они рабочие) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #f5f0eb; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
    .container { background: white; max-width: 480px; width: 100%; padding: 20px 20px 30px; border-radius: 32px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); text-align: center; margin-top: 10px; }
    .date { font-size: 1.4rem; font-weight: 500; color: #3e2c1b; letter-spacing: 0.5px; margin-bottom: 10px; }
    .cigarette-icon { font-size: 5rem; line-height: 1.2; margin: 6px 0 0; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
    .counter { margin: 12px 0 18px; }
    .counter-value { font-size: 4.2rem; font-weight: 700; color: #1e1e1e; background: #f2ede8; padding: 0 20px; border-radius: 60px; display: inline-block; min-width: 120px; line-height: 1.4; }
    .controls { display: flex; justify-content: center; gap: 24px; margin-top: 8px; }
    .controls button { font-size: 2.4rem; width: 64px; height: 64px; border: none; border-radius: 50%; background: #e8e0d8; color: #2d241c; cursor: pointer; transition: 0.15s ease; box-shadow: 0 4px 8px rgba(0,0,0,0.05); font-weight: 300; display: inline-flex; align-items: center; justify-content: center; }
    .controls button:active { transform: scale(0.92); background: #d6cdc3; }
    .controls .minus { background: #f0e3db; }
    .controls .plus { background: #d4c6b8; }
    .history { margin-top: 28px; border-top: 2px dashed #ddd6ce; padding-top: 20px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 4px; cursor: default; }
    .history-header .month-nav { display: flex; gap: 16px; align-items: center; }
    .history-header .month-nav button { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #5f4d3a; padding: 0 6px; line-height: 1; transition: 0.1s; }
    .history-header .month-nav button:hover { color: #2d1f14; transform: scale(1.1); }
    .history-header .month-label { font-weight: 600; font-size: 1.1rem; color: #3e2c1b; min-width: 120px; }
    .history-header .month-total { font-size: 0.95rem; background: #e6ddd4; padding: 2px 16px; border-radius: 30px; font-weight: 500; color: #2b1f16; }
    .collapse-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #7f6e5c; padding: 0 8px; transition: transform 0.2s; line-height: 1; }
    .collapse-btn:hover { color: #3e2c1b; }
    .collapse-btn.collapsed { transform: rotate(-90deg); }
    .history-days { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; padding-right: 4px; transition: max-height 0.25s ease, opacity 0.2s ease; }
    .history-days.collapsed { max-height: 0 !important; overflow: hidden; opacity: 0; padding: 0; margin: 0; gap: 0; }
    .history-days::-webkit-scrollbar { width: 4px; }
    .history-days::-webkit-scrollbar-thumb { background: #ccc5bc; border-radius: 10px; }
    .history-row { display: flex; justify-content: space-between; padding: 6px 14px; background: #f8f4f0; border-radius: 30px; font-size: 0.95rem; color: #2b1f16; cursor: pointer; transition: 0.15s; }
    .history-row:hover { background: #ede6de; }
    .history-row .day { font-weight: 500; }
    .history-row .count { font-weight: 600; background: #e6ddd4; padding: 0 14px; border-radius: 30px; }
    .history-row.today { background: #e2d7cc; font-weight: 500; }
    .history-row.empty-day { opacity: 0.6; }
    .reset-area { margin-top: 24px; display: flex; justify-content: center; }
    .reset-btn { background: none; border: 1px solid #ccc5bc; color: #6b5c4b; padding: 6px 18px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; transition: 0.15s; }
    .reset-btn:hover { background: #ede7e1; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 32px; padding: 28px 24px 24px; max-width: 340px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .modal-date { font-size: 1.2rem; font-weight: 600; color: #3e2c1b; margin-bottom: 6px; }
    .modal-day-label { font-size: 0.9rem; color: #7f6e5c; margin-bottom: 14px; }
    .modal-counter { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 8px 0 16px; }
    .modal-counter button { font-size: 2rem; width: 52px; height: 52px; border: none; border-radius: 50%; background: #e8e0d8; cursor: pointer; transition: 0.1s; color: #2d241c; display: inline-flex; align-items: center; justify-content: center; }
    .modal-counter button:active { transform: scale(0.92); background: #d6cdc3; }
    .modal-counter .modal-value { font-size: 2.8rem; font-weight: 700; min-width: 70px; background: #f2ede8; padding: 0 12px; border-radius: 40px; line-height: 1.4; }
    .modal-input-row { display: flex; gap: 10px; justify-content: center; margin: 8px 0 18px; }
    .modal-input-row input { width: 80px; padding: 8px 4px; font-size: 1.2rem; text-align: center; border: 2px solid #ddd6ce; border-radius: 30px; background: #faf8f6; outline: none; transition: 0.15s; }
    .modal-input-row input:focus { border-color: #b8a99a; }
    .modal-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
    .modal-actions button { padding: 8px 18px; border: none; border-radius: 40px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: 0.15s; flex: 1 0 auto; }
    .modal-actions .save-btn { background: #d4c6b8; color: #2d241c; }
    .modal-actions .save-btn:active { background: #c0b0a0; }
    .modal-actions .close-btn { background: #e8e0d8; color: #4d3e2e; }
    .modal-actions .close-btn:active { background: #d6cdc3; }
    .modal-actions .delete-btn { background: #f0d8d4; color: #8f3a33; }
    .modal-actions .delete-btn:active { background: #e6c4be; }
    .debug-version { font-size: 0.7rem; color: #aaa; margin-top: 12px; border-top: 1px solid #eee; padding-top: 8px; }
    @media (max-width: 420px) { .container { padding: 16px; } .counter-value { font-size: 3.2rem; min-width: 80px; } .controls button { width: 54px; height: 54px; font-size: 2rem; } .modal { padding: 20px 16px; } .modal-actions button { padding: 8px 14px; font-size: 0.85rem; } }
  </style>
</head>
<body>
<div class="container">
  <!-- ДАТА – ОБЯЗАТЕЛЬНО ОБНОВЛЯЕТСЯ -->
  <div class="date" id="dateDisplay">Загрузка...</div>

  <div class="cigarette-icon">🚬</div>
  <div class="counter">
    <span class="counter-value" id="counterValue">0</span>
  </div>
  <div class="controls">
    <button class="minus" id="decrementBtn">−</button>
    <button class="plus" id="incrementBtn">+</button>
  </div>
  <div class="history">
    <div class="history-header">
      <div class="month-nav">
        <button id="prevMonthBtn">◀</button>
        <span class="month-label" id="monthLabel">Июль 2026</span>
        <button id="nextMonthBtn">▶</button>
      </div>
      <div style="display: flex; align-items: center; gap: 6px;">
        <span class="month-total" id="monthTotal">Всего: 0</span>
        <button class="collapse-btn" id="collapseToggle">▼</button>
      </div>
    </div>
    <div class="history-days" id="historyContainer"></div>
  </div>
  <div class="reset-area">
    <button class="reset-btn" id="resetBtn">🗑️ Сбросить всю статистику</button>
  </div>
  <!-- ОТЛАДКА: показывает текущую дату и время загрузки -->
  <div class="debug-version">
    📅 <span id="debugDate"></span> &nbsp;|&nbsp; ⏱️ <span id="loadTime"></span>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-date" id="modalDate">13 июля 2026</div>
    <div class="modal-day-label" id="modalDayLabel"></div>
    <div class="modal-counter">
      <button id="modalDecBtn">−</button>
      <span class="modal-value" id="modalValue">0</span>
      <button id="modalIncBtn">+</button>
    </div>
    <div class="modal-input-row">
      <input type="number" id="modalInput" min="0" step="1" value="0">
      <button id="modalSetBtn" style="padding:8px 20px; border-radius:30px; border:none; background:#d4c6b8; font-weight:500;">Установить</button>
    </div>
    <div class="modal-actions">
      <button class="save-btn" id="modalSaveBtn">💾 Сохранить</button>
      <button class="delete-btn" id="modalDeleteBtn">🗑️ Удалить день</button>
      <button class="close-btn" id="modalCloseBtn">Закрыть</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'cigarette_counter_data';
    const COLLAPSE_KEY = 'history_collapsed';

    // ====== ДАННЫЕ ======
    function getDefaultData() { return {}; }
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (typeof parsed === 'object' && parsed !== null) return parsed;
        }
      } catch (_) {}
      return getDefaultData();
    }
    function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    // ====== ДАТА ======
    function getToday() {
      const d = new Date();
      return d.toISOString().split('T')[0];
    }
    function formatDateDisplay(dateStr) {
      const parts = dateStr.split('-');
      const year = parseInt(parts[0]);
      const month = parseInt(parts[1]) - 1;
      const day = parseInt(parts[2]);
      const monthNames = ['января','февраля','марта','апреля','мая','июня',
                         'июля','августа','сентября','октября','ноября','декабря'];
      return `${day} ${monthNames[month]} ${year}`;
    }
    function getMonthName(m) {
      const names = ['январь','февраль','март','апрель','май','июнь',
                     'июль','август','сентябрь','октябрь','ноябрь','декабрь'];
      return names[m];
    }
    function getDaysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
    function getDateFromTodayOffset(offset) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    }

    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let editingDate = null;
    let editingValue = 0;

    // ====== СВОРАЧИВАНИЕ ======
    function loadCollapseState() {
      try { return localStorage.getItem(COLLAPSE_KEY) === 'true'; } catch(_) { return false; }
    }
    function saveCollapseState(collapsed) {
      localStorage.setItem(COLLAPSE_KEY, String(collapsed));
    }
    function toggleCollapse() {
      const container = document.getElementById('historyContainer');
      const btn = document.getElementById('collapseToggle');
      const isCollapsed = container.classList.toggle('collapsed');
      btn.classList.toggle('collapsed', isCollapsed);
      saveCollapseState(isCollapsed);
    }
    function applyCollapseState(collapsed) {
      const container = document.getElementById('historyContainer');
      const btn = document.getElementById('collapseToggle');
      if (collapsed) {
        container.classList.add('collapsed');
        btn.classList.add('collapsed');
      } else {
        container.classList.remove('collapsed');
        btn.classList.remove('collapsed');
      }
    }

    // ====== ОСНОВНАЯ ФУНКЦИЯ ОБНОВЛЕНИЯ ======
    function render(data) {
      // 1. Получаем сегодняшнюю дату
      const today = getToday();

      // 2. Обновляем дату вверху
      document.getElementById('dateDisplay').textContent = formatDateDisplay(today);

      // 3. Обновляем отладочную строку (дата в формате YYYY-MM-DD + время)
      document.getElementById('debugDate').textContent = today + ' (' + formatDateDisplay(today) + ')';
      document.getElementById('loadTime').textContent = new Date().toLocaleTimeString();

      // 4. Счётчик
      const todayCount = data[today] || 0;
      document.getElementById('counterValue').textContent = todayCount;

      // 5. История
      renderMonthHistory(data, currentYear, currentMonth);
    }

    function renderMonthHistory(data, year, month) {
      const container = document.getElementById('historyContainer');
      const labelEl = document.getElementById('monthLabel');
      const totalEl = document.getElementById('monthTotal');

      labelEl.textContent = `${getMonthName(month)} ${year}`;
      const daysInMonth = getDaysInMonth(year, month);
      const today = getToday();
      let total = 0;
      let html = '';
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const count = data[dateStr] || 0;
        total += count;
        const isToday = (dateStr === today);
        const rowClass = isToday ? 'history-row today' : 'history-row';
        const emptyClass = (count === 0) ? ' empty-day' : '';
        html += `<div class="${rowClass}${emptyClass}" data-date="${dateStr}">
                  <span class="day">${day}</span>
                  <span class="count">${count}</span>
                </div>`;
      }
      container.innerHTML = html;
      totalEl.textContent = `Всего: ${total}`;

      container.querySelectorAll('.history-row').forEach(row => {
        row.addEventListener('click', function() {
          const dateStr = this.dataset.date;
          if (dateStr) openEditor(dateStr);
        });
      });
      const isCollapsed = loadCollapseState();
      applyCollapseState(isCollapsed);
    }

    // ====== ИЗМЕНЕНИЕ СЧЁТЧИКА ======
    function changeTodayCount(delta) {
      const data = loadData();
      const today = getToday();
      const current = data[today] || 0;
      const newValue = Math.max(0, current + delta);
      data[today] = newValue;
      saveData(data);
      render(data);
    }

    // ====== НАВИГАЦИЯ ПО МЕСЯЦАМ ======
    function changeMonth(offset) {
      currentMonth += offset;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      const data = loadData();
      render(data);
    }

    // ====== СБРОС ======
    function resetAll() {
      if (confirm('Вы уверены, что хотите удалить всю историю?')) {
        saveData({});
        render({});
      }
    }

    // ====== УДАЛЕНИЕ ДНЯ ======
    function deleteDay(dateStr) {
      if (!dateStr) return;
      if (!confirm(`Удалить запись за ${formatDateDisplay(dateStr)}?`)) return;
      const data = loadData();
      delete data[dateStr];
      saveData(data);
      closeEditor();
      render(data);
    }

    // ====== РЕДАКТОР ======
    function openEditor(dateStr) {
      const data = loadData();
      editingDate = dateStr;
      editingValue = data[dateStr] || 0;
      document.getElementById('modalDate').textContent = formatDateDisplay(dateStr);
      const today = getToday();
      const label = dateStr === today ? 'сегодня' : (dateStr === getDateFromTodayOffset(-1) ? 'вчера' : '');
      document.getElementById('modalDayLabel').textContent = label ? `(${label})` : '';
      document.getElementById('modalValue').textContent = editingValue;
      document.getElementById('modalInput').value = editingValue;
      document.getElementById('modalOverlay').classList.add('active');
    }
    function closeEditor() {
      document.getElementById('modalOverlay').classList.remove('active');
      editingDate = null;
    }
    function updateEditorValue(newVal) {
      newVal = Math.max(0, parseInt(newVal, 10) || 0);
      editingValue = newVal;
      document.getElementById('modalValue').textContent = editingValue;
      document.getElementById('modalInput').value = editingValue;
    }
    function saveEditor() {
      if (editingDate === null) return;
      const data = loadData();
      data[editingDate] = editingValue;
      saveData(data);
      closeEditor();
      render(data);
    }

    // ====== АВТООБНОВЛЕНИЕ ПРИ ВОЗВРАЩЕНИИ ======
    function refreshOnFocus() {
      const data = loadData();
      render(data);
    }

    // ====== ИНИЦИАЛИЗАЦИЯ ======
    function init() {
      const data = loadData();
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();

      // Первый рендер
      render(data);

      // Кнопки
      document.getElementById('incrementBtn').addEventListener('click', () => changeTodayCount(1));
      document.getElementById('decrementBtn').addEventListener('click', () => changeTodayCount(-1));
      document.getElementById('prevMonthBtn').addEventListener('click', () => changeMonth(-1));
      document.getElementById('nextMonthBtn').addEventListener('click', () => changeMonth(1));
      document.getElementById('resetBtn').addEventListener('click', resetAll);
      document.getElementById('collapseToggle').addEventListener('click', toggleCollapse);

      // Модалка
      const overlay = document.getElementById('modalOverlay');
      overlay.addEventListener('click', function(e) {
        if (e.target === this) closeEditor();
      });
      document.getElementById('modalCloseBtn').addEventListener('click', closeEditor);
      document.getElementById('modalSaveBtn').addEventListener('click', saveEditor);
      document.getElementById('modalDeleteBtn').addEventListener('click', function() {
        if (editingDate) deleteDay(editingDate);
      });
      document.getElementById('modalIncBtn').addEventListener('click', () => updateEditorValue(editingValue + 1));
      document.getElementById('modalDecBtn').addEventListener('click', () => updateEditorValue(editingValue - 1));
      document.getElementById('modalSetBtn').addEventListener('click', () => {
        const input = document.getElementById('modalInput');
        const val = parseInt(input.value, 10);
        if (!isNaN(val) && val >= 0) updateEditorValue(val);
        else input.value = editingValue;
      });
      const modalInput = document.getElementById('modalInput');
      modalInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('modalSetBtn').click();
      });
      modalInput.addEventListener('blur', function() {
        const val = parseInt(this.value, 10);
        if (!isNaN(val) && val >= 0) updateEditorValue(val);
        else this.value = editingValue;
      });

      // Автообновление при возвращении
      function refresh() { refreshOnFocus(); }
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') refresh();
      });
      window.addEventListener('focus', refresh);

      // ====== ВАЖНО: Service Worker ОТКЛЮЧЁН ======
      // Регистрация SW закомментирована, чтобы не было ошибок
      /*
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW registered'))
          .catch(err => console.warn('SW registration failed', err));
      }
      */
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
</body>
</html>
